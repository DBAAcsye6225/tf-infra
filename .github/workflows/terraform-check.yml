name: Terraform Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform_dir: [aws, gcp]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0
      
      - name: Terraform Format Check
        working-directory: ./${{ matrix.terraform_dir }}
        run: terraform fmt -check -recursive
      
      - name: Terraform Init
        working-directory: ./${{ matrix.terraform_dir }}
        run: terraform init -backend=false

      - name: Create dummy Lambda JAR for validation
        if: matrix.terraform_dir == 'aws'
        run: mkdir -p "${GITHUB_WORKSPACE}/.ci" && touch "${GITHUB_WORKSPACE}/.ci/serverless-1.0-SNAPSHOT.jar"
      
      - name: Terraform Validate
        working-directory: ./${{ matrix.terraform_dir }}
        run: terraform validate
        env:
          TF_VAR_lambda_jar_path: ${{ matrix.terraform_dir == 'aws' && format('{0}/.ci/serverless-1.0-SNAPSHOT.jar', github.workspace) || '' }}
